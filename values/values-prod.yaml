## values/values-prod.yaml — GPU production. SHARED overlay for all four charts.
## See values-local.yaml for how the shared file maps onto each chart.
##
## Per-model (GPU path): --set servedModelName=<repo> --set modelStorage.pvc.existingClaim=<pvc>
## Pre-seed each model's PVC out-of-band (the GPU path never pulls from HuggingFace at
## start) — see samples/model-pvc.yaml. The cert-manager Issuer/ClusterIssuer named in
## tls.issuerRef must already exist.

## ── foundation + control-plane (Bitnami-style wrappers; consume global:) ─────────
global:
  imageRegistry: ""        # set to your private mirror for air-gapped installs
  imagePullSecrets: []
cert-manager:
  enabled: true
lws:
  enabled: false

## ── llm-gateway (flat) ───────────────────────────────────────────────────────────
hostname: llm.example.com
tls:
  enabled: true
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: llm-gateway-tls
bbr:
  enabled: true

## ── model-server (flat) ─────────────────────────────────────────────────────────
gpu:
  enabled: true          # vLLM on GPU reading a pre-seeded PVC
  type: nvidia.com/gpu
replicaCount: 2
modelStorage:
  pvc:
    existingClaim: ""     # REQUIRED per model release — set via --set
    subPath: "."
vllm:
  image:
    repository: vllm/vllm-openai
    tag: v0.19.1
  args:
    - --max-model-len=8192
    - --gpu-memory-utilization=0.90
  resources:
    limits:
      nvidia.com/gpu: 1
      memory: 24Gi
      cpu: "8"
  nodeSelector: {}        # e.g. { nvidia.com/gpu.product: NVIDIA-H200 }
  tolerations: []         # e.g. [ { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule } ]
  topologySpreadConstraints: []
  shmSize: 8Gi

## ── telemetry (Prometheus + Grafana + Alertmanager) ──────────────────────────────
## Same shared switches as local; prod adds persistent storage, longer retention, resource
## limits, and the real-cluster control-plane scrapes. Point Alertmanager at a real receiver
## (Slack/PagerDuty/etc.) via kube-prometheus-stack.alertmanager.config before going live.
monitoring:
  enabled: true
agentgateway:
  monitoring:
    enabled: true
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: "45GB"
      resources:
        requests: { cpu: 500m, memory: 2Gi }
        limits:   { memory: 4Gi }
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
  grafana:
    persistence:
      enabled: true
      size: 5Gi
  # Real cluster — scrape the control-plane components kind doesn't expose.
  kubeControllerManager: { enabled: true }
  kubeScheduler: { enabled: true }
  kubeProxy: { enabled: true }
  kubeEtcd: { enabled: true }
