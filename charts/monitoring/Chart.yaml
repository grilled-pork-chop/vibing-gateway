apiVersion: v2
name: monitoring
description: >
  Telemetry stack for the LLM platform: Prometheus + Alertmanager + Grafana + the
  Prometheus Operator (via kube-prometheus-stack), plus the platform's Grafana
  dashboards and PrometheusRule alerts. Scrapes vLLM and agentgateway for per-model /
  per-pod request & token usage. Deploy once, after control-plane.
type: application
version: 0.1.0
appVersion: "1.0.0"
kubeVersion: ">=1.30.0-0"
keywords:
  - prometheus
  - grafana
  - alertmanager
  - observability
  - telemetry
maintainers:
  - name: vibing-team

dependencies:
  # Prometheus + Alertmanager + Grafana + operator. This chart owns the operator CRDs
  # (values: crds.enabled=true) — they're version-locked to the operator and upgrade with
  # it, so they ride here rather than in foundation. Version resolved/locked by `make deps`.
  - name: kube-prometheus-stack
    repository: https://prometheus-community.github.io/helm-charts
    version: "75.6.0"
    condition: kube-prometheus-stack.enabled
