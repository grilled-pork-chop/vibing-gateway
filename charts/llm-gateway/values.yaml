## Global configuration overrides for the gateway chart.

## @section Gateway
##
## NOTE: namespace + gatewayName together MUST equal the control-plane value
## kserve-llmisvc-resources.kserve.controller.gateway.ingressGateway.kserveGateway
## (default kserve/kserve-ingress-gateway) — that is the Gateway the KServe-managed router
## attaches its HTTPRoute to. Change both in lockstep.
##
## @param namespace Namespace where the Gateway is created — must be a namespace KServe watches for ingress
## @param className GatewayClass name (auto-registered by the AgentGateway controller; this chart does not create it)
## @param gatewayName Name of the Gateway; KServe-managed HTTPRoutes attach here via the serving.kserve.io/gateway label
## @param hostname Hostname clients connect with — used by HTTPS listeners and the TLS Certificate dnsNames
## @param listeners Listener list rendered on the Gateway (HTTP/HTTPS)
##
namespace: kserve
className: agentgateway
gatewayName: kserve-ingress-gateway
hostname: llm.local
listeners:
  - name: http
    port: 80
    protocol: HTTP

## @section TLS
##
## @param tls.enabled Add a 443 HTTPS listener and request a cert-manager Certificate
## @param tls.issuerRef.name cert-manager Issuer/ClusterIssuer that signs the certificate
## @param tls.issuerRef.kind Kind of the cert-manager issuer — typically ClusterIssuer
## @param tls.secretName Secret cert-manager writes the cert to and the listener reads from
##
tls:
  enabled: false
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  secretName: llm-gateway-tls

## @section Body-Based Router (native AgentGateway PreRouting transformation)
##
## @param bbr.enabled Render the AgentgatewayPolicy that extracts `model` from the OpenAI
##   JSON body and stamps X-Gateway-Model-Name before route selection. No extra pod is
##   deployed — the transform runs inside the AgentGateway proxy. Needed for multi-pool
##   fanout where HTTPRoute rules match on X-Gateway-Model-Name.
##
bbr:
  enabled: true

## @section Guardrails (native AgentGateway promptGuard on the LLM call)
##
## Renders an AgentgatewayPolicy that attaches `backend.ai.promptGuard` to the Gateway, so the
## guardrails apply to every AI backend reached through it — both the dedicated
## /<namespace>/<release>/v1 routes and the BBR global /v1 fanout. Routing is unaffected: the
## policy only masks/rejects/enriches prompts and responses, it does not change route selection.
##
## @param guardrails.enabled Render the guardrails AgentgatewayPolicy
## @param guardrails.systemPrompt SYSTEM message prepended to every request (omit/empty to skip)
## @param guardrails.pii.enabled Mask (or reject) built-in sensitive-data patterns in request and response
## @param guardrails.pii.action Action when a PII pattern matches a request — Mask or Reject
## @param guardrails.pii.builtins Built-in patterns to match — Ssn, CreditCard, PhoneNumber, Email, CaSin
## @param guardrails.reject.enabled Reject requests whose prompt matches a banned pattern
## @param guardrails.reject.matches Custom regex patterns that trigger rejection
## @param guardrails.reject.message Response body returned to the client on rejection
## @param guardrails.reject.statusCode HTTP status returned to the client on rejection
##
guardrails:
  enabled: false
  systemPrompt: "You are a helpful assistant. Refuse unsafe or disallowed requests."
  pii:
    enabled: true
    action: Mask                       # Mask | Reject
    builtins: [Ssn, CreditCard, Email] # also: PhoneNumber, CaSin
  reject:
    enabled: true
    matches:
      - "(?i)\\bpassword\\b"
      - "(?i)\\bsecret\\b"
    message: "The request was rejected due to inappropriate content."
    statusCode: 403

## @section Models endpoint (unified OpenAI-compatible GET /v1/models)
##
## Deploys the models-aggregator: a small in-cluster service that discovers every model on the
## gateway — in-cluster KServe LLMInferenceServices and external slurm-models routes — and serves
## them as one OpenAI model list. An Exact-match HTTPRoute on /v1/models points at it; the Exact
## match outranks the /v1 BBR fanout so inference routing is untouched. Each model is advertised
## under its fully-qualified Body-Based-Routing name <publisherPrefix>/<namespace>/models/<servedName>,
## so an id read from /v1/models can be posted straight back to /v1/chat completions.
##
## @param modelsEndpoint.enabled Render the models-aggregator (Deployment, Service, RBAC, HTTPRoute)
## @param modelsEndpoint.image.registry Aggregator image registry (must match the images.txt entry)
## @param modelsEndpoint.image.repository Aggregator image repository
## @param modelsEndpoint.image.tag Aggregator image tag
## @param modelsEndpoint.image.pullPolicy Aggregator image pull policy
## @param modelsEndpoint.port Port the aggregator listens on inside the pod (Service fronts it on 80)
## @param modelsEndpoint.backendPort OpenAI port the aggregator probes on in-cluster (KServe) backends
## @param modelsEndpoint.publisherPrefix First segment of the fully-qualified routing key
## @param modelsEndpoint.requestTimeoutSeconds Per-backend probe timeout (unreachable backends keep their last-known-good entry)
## @param modelsEndpoint.refreshIntervalSeconds Background poll interval that refreshes the cached /v1/models responses
##
modelsEndpoint:
  enabled: true
  image:
    registry: ghcr.io
    repository: llm-gateway/llm-models-aggregator
    tag: v0.1.0
    pullPolicy: IfNotPresent
  port: 8080
  backendPort: 8000
  publisherPrefix: publishers
  requestTimeoutSeconds: 3
  refreshIntervalSeconds: 30

## @section Per-user usage attribution (best-effort, header-based)
##
## Renders an AgentgatewayPolicy that records/normalises a caller identity header so usage can be
## broken down by user (the "Usage by user" Grafana dashboard). Best-effort only — the header is
## client-supplied and spoofable; this is for visibility, NOT authentication. Off by default; the
## shared overlays enable it. See TELEMETRY.md for how the header reaches Prometheus.
##
## @param usageAttribution.enabled Render the usage-attribution AgentgatewayPolicy
## @param usageAttribution.header Identity header recorded for attribution
## @param usageAttribution.defaultValue Value stamped when the caller omits the header (keeps the label bounded)
##
usageAttribution:
  enabled: false
  header: X-User
  defaultValue: unknown

## @section Common Parameters
##
## @param commonLabels Labels added to every deployed resource
## @param commonAnnotations Annotations added to every deployed resource
##
commonLabels: {}
commonAnnotations: {}
