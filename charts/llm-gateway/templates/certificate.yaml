{{- /*
cert-manager Certificate — only rendered when TLS is enabled. Writes to
.Values.tls.secretName, which the Gateway HTTPS listener references. Requires the
referenced Issuer/ClusterIssuer to exist (see README "Must-do before production").
*/ -}}
{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.tls.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  {{- include "llm-gateway.annotations" . | nindent 2 }}
spec:
  secretName: {{ .Values.tls.secretName }}
  dnsNames:
    - {{ .Values.hostname | quote }}
  issuerRef:
    name: {{ .Values.tls.issuerRef.name }}
    kind: {{ .Values.tls.issuerRef.kind }}
{{- end }}
