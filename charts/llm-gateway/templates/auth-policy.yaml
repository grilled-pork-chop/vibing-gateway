{{- /*
AgentgatewayPolicy — API-key authentication.
Attaches spec.traffic.apiKeyAuthentication to the Gateway, so every route reached through it requires
a valid API key — the dedicated /<namespace>/<release>/v1 routes, the BBR global /v1 fanout, and the
Exact /v1/models endpoint are all covered by this single attachment (mirrors the bbr-policy.yaml /
guardrails-policy.yaml targetRefs pattern). Clients send `Authorization: Bearer <key>`, the OpenAI
convention every SDK/notebook already speaks.

The keys live in an Opaque Secret (.Values.auth.secretName) created out-of-band — this chart does NOT
render it, so keys never sit in values/git. See docs/EXPOSE.md for the Secret format and rotation.

NOTE: the apiKeyAuthentication field names + Secret key layout are validated against the pinned
agentgateway v1.2.1 CRD at install time — see docs/EXPOSE.md "CRD field verification". The structure
(gating, targetRefs, mode, secretRef) is stable regardless of exact key spelling.
*/ -}}
{{- if .Values.auth.enabled }}
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: {{ .Values.gatewayName }}-auth
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  {{- include "llm-gateway.annotations" . | nindent 2 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayName }}
  traffic:
    apiKeyAuthentication:
      mode: {{ .Values.auth.mode }}
      secretRef:
        name: {{ .Values.auth.secretName }}
{{- end }}
