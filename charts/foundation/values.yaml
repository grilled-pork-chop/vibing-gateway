## Global configuration overrides for the foundation chart.

## @section CRD toggles
##
## @param gatewayApiCRDs.enabled Render the vendored Gateway API v1.4.1 CRDs
## @param gieCRDs.enabled Render the vendored Gateway API Inference Extension v1.3.1 CRDs
##
gatewayApiCRDs:
  enabled: true
gieCRDs:
  enabled: true

## @section cert-manager (jetstack)
##
## @param cert-manager.enabled Install cert-manager — required by KServe webhooks
## @param cert-manager.crds.enabled Install cert-manager's own CRDs with the chart
##
cert-manager:
  enabled: true
  crds:
    enabled: true

## @section KServe llmisvc CRD charts
##
## @param kserve-llmisvc-crd.enabled Install the KServe LLMInferenceService CRD chart
##
kserve-llmisvc-crd:
  enabled: true

## @section AgentGateway CRD chart
##
## @param agentgateway-crds.enabled Install the AgentGateway CRD chart
##
agentgateway-crds:
  enabled: true

## @section Prometheus Operator CRD chart
##
## CRD-only chart for the Prometheus Operator (ServiceMonitor, PodMonitor, PrometheusRule,
## Prometheus, Alertmanager, Probe, …). foundation is the single CRD owner; the `monitoring`
## chart installs the operator + Prometheus/Grafana/Alertmanager with crds.enabled=false.
## Telemetry is opt-in — leave on by default, or set false on clusters that already ship
## the operator CRDs (then the `monitoring` chart relies on those).
##
## @param prometheus-operator-crds.enabled Install the Prometheus Operator CRDs
##
prometheus-operator-crds:
  enabled: true
