## Configuration for the foundation chart — the cluster-prerequisite tier
## (cert-manager + ClusterIssuer + optional LeaderWorkerSet).
## Platform CRDs are owned by the platform-crds chart, not here.

## @section cert-manager (jetstack)
##
## @param cert-manager.enabled Install cert-manager — required by KServe webhooks
## @param cert-manager.crds.enabled Install cert-manager's own CRDs with the chart
##
cert-manager:
  enabled: true
  crds:
    enabled: true

## @section Platform ClusterIssuer (for Gateway TLS)
##
## Creates the ClusterIssuer that llm-gateway's tls.issuerRef points at, so Gateway TLS
## resolves out of the box. Set kind: selfsigned for local; switch to an ACME/CA issuer
## in prod via the overlay (see values/values-prod.yaml).
##
## @param issuer.enabled Create the platform ClusterIssuer
## @param issuer.name Name of the ClusterIssuer (must match llm-gateway tls.issuerRef.name)
## @param issuer.kind Issuer flavor: "selfsigned" | "ca" | "acme"
## @param issuer.ca.secretName For kind=ca, the Secret holding the signing CA cert/key
## @param issuer.acme For kind=acme, the ACME server/email/solver config
##
issuer:
  enabled: true
  name: selfsigned
  kind: selfsigned
  ca:
    secretName: ""
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ""
    privateKeySecretName: ""
    solver: {}

## @section LeaderWorkerSet (optional, multi-node)
##
## @param lws.enabled Install the LeaderWorkerSet operator — only for multi-node (data/expert parallel) serving
##
lws:
  enabled: false
