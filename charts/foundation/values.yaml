## Global configuration overrides for the foundation chart.

## @section CRD toggles
##
## @param gatewayApiCRDs.enabled Render the vendored Gateway API v1.4.1 CRDs
## @param gieCRDs.enabled Render the vendored Gateway API Inference Extension v1.3.1 CRDs
##
gatewayApiCRDs:
  enabled: true
gieCRDs:
  enabled: true

## @section cert-manager (jetstack)
##
## @param cert-manager.enabled Install cert-manager — required by KServe webhooks
## @param cert-manager.crds.enabled Install cert-manager's own CRDs with the chart
##
cert-manager:
  enabled: true
  crds:
    enabled: true

## @section KServe llmisvc CRD charts
##
## @param kserve-llmisvc-crd.enabled Install the KServe LLMInferenceService CRD chart
##
kserve-llmisvc-crd:
  enabled: true

## @section AgentGateway CRD chart
##
## @param agentgateway-crds.enabled Install the AgentGateway CRD chart
##
agentgateway-crds:
  enabled: true
