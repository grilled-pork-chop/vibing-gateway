apiVersion: v2
name: foundation
description: >
  Cluster-prerequisite tier: installs cert-manager, a platform ClusterIssuer for
  Gateway TLS, and (optionally) the LeaderWorkerSet operator for multi-node serving.
  Platform CRDs live in the platform-crds chart — install that first.
type: application
version: 0.1.0
appVersion: "0.19.0-rc0"
kubeVersion: ">=1.30.0-0"
keywords:
  - cert-manager
  - clusterissuer
  - leaderworkerset
  - bootstrap
maintainers:
  - name: vibing-team

dependencies:
  # cert-manager — required by KServe webhooks and (optionally) Gateway TLS. Owns its own CRDs.
  - name: cert-manager
    repository: oci://quay.io/jetstack/charts
    version: "v1.17.0"
    condition: cert-manager.enabled
  # LeaderWorkerSet — only needed for multi-node (data/expert parallel) serving. Operator owns its CRD.
  - name: lws
    repository: oci://registry.k8s.io/lws/charts
    version: "0.8.0"
    condition: lws.enabled
