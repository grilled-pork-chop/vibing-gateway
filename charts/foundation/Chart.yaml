apiVersion: v2
name: foundation
description: >
  Bootstraps LLM platform core infrastructure, including cert-manager,
  Gateway API, GIE, and KServe llmisvc CRDs.
type: application
version: 0.1.0
appVersion: "0.19.0-rc0"
kubeVersion: ">=1.30.0-0"
keywords:
  - cert-manager
  - gateway-api
  - gateway-api-inference-extension
  - kserve
  - crds
maintainers:
  - name: vibing-team

dependencies:
  # cert-manager — required by KServe webhooks and (optionally) Gateway TLS.
  - name: cert-manager
    repository: oci://quay.io/jetstack/charts
    version: "v1.17.0"
    condition: cert-manager.enabled
  # KServe LLMInferenceService CRDs (the generative path).
  - name: kserve-llmisvc-crd
    repository: oci://ghcr.io/kserve/charts
    version: "v0.19.0-rc0"
    condition: kserve-llmisvc-crd.enabled
  # AgentGateway CRDs (AgentgatewayBackend / AgentgatewayPolicy / parameters).
  - name: agentgateway-crds
    repository: oci://cr.agentgateway.dev/charts
    version: "v1.2.1"
    condition: agentgateway-crds.enabled
  # Prometheus Operator CRDs (ServiceMonitor / PodMonitor / PrometheusRule / Prometheus /
  # Alertmanager / Probe …). foundation owns ALL CRDs, so these live here — the `monitoring`
  # chart deploys the operator + Prometheus/Grafana/Alertmanager with its own crds.enabled=false
  # to keep a single CRD owner. CRD-only chart; resolved/locked by `make deps`.
  - name: prometheus-operator-crds
    repository: https://prometheus-community.github.io/helm-charts
    version: "20.0.0"
    condition: prometheus-operator-crds.enabled
